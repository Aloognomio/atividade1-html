        <center>
            <h1>Cadastro</h1>
        </center>
        <br>
        <p>Formulario de cadastro abaixo</p>
        <form>
            <label>Nome:</label>
            <input type="text">
            <br>
            <br>
            <label>Idade</label>
            <input type="number">
            <br>
            <br>
            <label>Data de nascimento</label>
            <input type="date">
            <br>
            <br>
            <label>E-mail</label>
            <input type="email">
            <br>
            <br>
            <label>Senha</label>
            <input type="password">
            <br>
            <br>
            <label>Hobbies</label>
            <input type="checkbox"> Videogames
            <input type="checkbox"> Tocar instrumento
            <input type="checkbox"> Leitura
            <br>
            <br>
            <label>Turno de estudo</label>
            <input type="radio" name="Turno">Manhã
            <input type="radio" name="Turno">Tarde
            <input type="radio" name="Turno">Noite
            <br>
            <br>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </form>
